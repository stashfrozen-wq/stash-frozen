project_name: aat-project
source_path: .
url: 'http://localhost:3000'
ai:
  provider: claude
  api_key: ''
  model: claude-sonnet-4-20250514
  max_tokens: 4000
  temperature: 0.3
  step_verify: false
  step_verify_critical_only: true
vision:
  provider: ''
  api_key: ''
  model: ''
engine:
  type: web
  browser: chromium
  headless: false
  viewport_width: 1280
  viewport_height: 720
  timeout_ms: 30000
  slow_mo: null
  window_x: null
  window_y: null
  fast_mode: false
  speed: normal
  screenshot_mode: all
  verbosity: detailed
matching:
  confidence_threshold: 0.85
  multi_scale: true
  scale_range_min: 0.5
  scale_range_max: 2.0
  grayscale: true
  ocr_languages:
  - eng
  - kor
  chain_order:
  - learned
  - template
  - ocr
  - feature
  - vision_ai
humanizer:
  enabled: true
  mouse_speed_min: 0.1
  mouse_speed_max: 0.25
  typing_delay_min: 0.05
  typing_delay_max: 0.15
  bezier_control_points: 3
test_accounts: {}
scenarios_dir: scenarios
reports_dir: reports
assets_dir: assets
data_dir: .aat
max_loops: 10
approval_mode: auto
